name: "EcoLint AI"
description: "ESLint for wasteful AI compute. Scan a codebase for avoidable AI compute waste."
author: "EcoLint AI contributors"
branding:
  icon: "wind"
  color: "green"

inputs:
  path:
    description: "Path to scan"
    required: false
    default: "."
  min-severity:
    description: "Minimum severity to report (low | medium | high)"
    required: false
    default: "low"
  format:
    description: "Report format (markdown | json)"
    required: false
    default: "markdown"
  comment:
    description: "Post or update an EcoLint AI comment on pull requests"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Run EcoLint AI
      id: ecolint
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_MIN_SEVERITY: ${{ inputs.min-severity }}
        INPUT_FORMAT: ${{ inputs.format }}
      run: |
        REPORT="${RUNNER_TEMP:-.}/ecolint-report.md"

        # Always generate a Markdown report file for the job summary and any PR
        # comment. Markdown reports include every finding.
        npx --yes ecolint-ai scan \
          --path "$INPUT_PATH" \
          --min-severity "$INPUT_MIN_SEVERITY" \
          --markdown \
          --output "$REPORT"

        # The CLI skips writing the file when there are no scannable files;
        # fall back to a minimal report so the summary and comment steps work.
        if [ ! -f "$REPORT" ]; then
          printf '# EcoLint AI Report\n\nNo scannable files were found under `%s`.\n' \
            "$INPUT_PATH" > "$REPORT"
        fi

        # Print the report to the workflow log in the requested display format.
        if [ "$INPUT_FORMAT" = "json" ]; then
          npx --yes ecolint-ai scan \
            --path "$INPUT_PATH" \
            --min-severity "$INPUT_MIN_SEVERITY" \
            --json || true
        else
          cat "$REPORT"
        fi

        # Publish the report to the job summary.
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
        fi

        echo "report-path=$REPORT" >> "$GITHUB_OUTPUT"

    - name: Post or update PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        REPORT_PATH: ${{ steps.ecolint.outputs.report-path }}
      with:
        github-token: ${{ github.token }}
        script: |
          // Mirrors src/prComment.ts (buildCommentBody). Keep the two in sync.
          const fs = require("fs");
          const MARKER = "<!-- ecolint-ai-report -->";
          const MAX_LENGTH = 60000;

          const report = fs.readFileSync(process.env.REPORT_PATH, "utf8").trimEnd();

          let body;
          if (report.length <= MAX_LENGTH) {
            body = `${MARKER}\n${report}\n`;
          } else {
            const slice = report.slice(0, MAX_LENGTH);
            const lastNewline = slice.lastIndexOf("\n");
            const truncated = (lastNewline > 0 ? slice.slice(0, lastNewline) : slice).trimEnd();
            const note =
              "> ⚠️ This report was truncated to fit a PR comment. " +
              "See the full EcoLint AI report in the workflow **job summary**.";
            body = `${MARKER}\n${truncated}\n\n---\n\n${note}\n`;
          }

          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(MARKER));

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }

    - name: PR comment skipped (not a pull request)
      if: ${{ inputs.comment == 'true' && github.event_name != 'pull_request' }}
      shell: bash
      run: |
        echo "EcoLint AI: PR comments are only available on pull_request events." \
          "The report was written to the job summary instead."
