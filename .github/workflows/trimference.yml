name: Trimference

# Runs Trimference on the example app using the repo's own source, without
# needing the package to be published to npm. Writes a Markdown report into the
# GitHub Actions job summary, and — on pull requests — posts/updates a PR comment.

on:
  push:
  pull_request:
  workflow_dispatch:

# pull-requests: write lets the built-in GITHUB_TOKEN post the PR comment below.
permissions:
  contents: read
  pull-requests: write

jobs:
  trimference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Dogfood the scanner
        run: |
          node dist/cli.js scan --path src --summary --fail-on low
          node dist/cli.js scan --path examples/cleaner-ai-app --summary --fail-on low

      # Generate the report even if a prior step (e.g. tests) fails, so the
      # summary and artifact steps below always have a file to work with.
      - name: Run Trimference on the example app
        if: always()
        run: |
          node dist/cli.js scan \
            --path examples/wasteful-ai-app \
            --markdown \
            --output trimference-report.md

      - name: Publish report to job summary
        if: always()
        run: |
          if [ -f trimference-report.md ]; then
            cat trimference-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No trimference-report.md was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trimference-report
          path: trimference-report.md
          if-no-files-found: warn

      # On pull requests, post or update a single Trimference comment. Mirrors the
      # comment logic in action.yml (buildCommentBody in src/prComment.ts).
      - name: Post or update PR comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const MARKER = "<!-- trimference-report -->";
            const LEGACY_MARKER = "<!-- ecolint-ai-report -->";
            const MAX_LENGTH = 60000;

            let report;
            try {
              report = fs.readFileSync("trimference-report.md", "utf8").trimEnd();
            } catch {
              report = "# Trimference Report\n\nNo report was generated.";
            }

            let body;
            if (report.length <= MAX_LENGTH) {
              body = `${MARKER}\n${report}\n`;
            } else {
              const slice = report.slice(0, MAX_LENGTH);
              const lastNewline = slice.lastIndexOf("\n");
              const truncated = (lastNewline > 0 ? slice.slice(0, lastNewline) : slice).trimEnd();
              const note =
                "> ⚠️ This report was truncated to fit a PR comment. " +
                "See the full Trimference report in the workflow **job summary**.";
              body = `${MARKER}\n${truncated}\n\n---\n\n${note}\n`;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) => c.body && (c.body.includes(MARKER) || c.body.includes(LEGACY_MARKER)),
            );

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
